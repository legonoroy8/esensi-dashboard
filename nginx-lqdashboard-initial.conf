# LQ Dashboard Nginx Configuration - INITIAL (Before SSL)
# File: /etc/nginx/sites-available/lqdashboard.esensigroup.com
# Use this FIRST, then run certbot to add SSL

server {
    listen 80;
    server_name lqdashboard.esensigroup.com;

    # Frontend - Serve static files from React build
    root /home/YOUR_USER/taktis/apps/leadsqualifier-dashboard/frontend/dist;
    index index.html;

    # API proxy to backend
    location /api {
        proxy_pass http://localhost:3001;
    
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        proxy_connect_timeout 300s;
    
        proxy_buffering off;
    }

    # Frontend routing (React Router)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
